<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrindBoard – Academic Performance Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="focus-overlay" class="focus-overlay hidden">
    <div class="focus-header">
      <span class="focus-label">// FOCUS MODE :: GRINDBOARD OS</span>
      <button id="focus-exit-btn" class="focus-exit-btn">✕ EXIT</button>
    </div>
    <div class="focus-body">
      <div class="focus-timer" id="focus-timer">25:00</div>
      <div class="focus-controls">
        <button id="focus-start-btn" class="btn-focus-ctrl btn-start">▶ START</button>
        <button id="focus-pause-btn" class="btn-focus-ctrl btn-pause hidden">⏸ PAUSE</button>
        <button id="focus-reset-btn" class="btn-focus-ctrl btn-reset">↺ RESET</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">GB</div>
        <div class="brand-text">
          <span class="brand-name">GrindBoard</span>
          <span class="brand-sub">v2.0 // OS</span>
        </div>
        <button id="mobile-nav-toggle" class="mobile-toggle">☰</button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#" class="nav-item active" data-panel="dashboard"><span>⊞</span> Dashboard</a>
        <a href="#" class="nav-item" data-panel="study"><span>📚</span> Study Tracker</a>
        <a href="#" class="nav-item" data-panel="subjects"><span>🧠</span> Subjects</a>
        <a href="#" class="nav-item" data-panel="journal"><span>📝</span> Mistake Journal</a>
        <a href="#" class="nav-item" data-panel="analytics"><span>📊</span> Analytics</a>
        <a href="#" class="nav-item" data-panel="settings"><span>⚙</span> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-reset-data" id="btn-reset-data">⚠ Reset Data</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-breadcrumb" id="topbar-breadcrumb">/ dashboard</div>
        <div class="topbar-right">
          <div class="topbar-score-mini">POWER: <span id="topbar-score">--</span></div>
          <div id="topbar-time" class="topbar-time">00:00:00</div>
        </div>
      </header>

      <section class="panel active" id="panel-dashboard">
        <div class="greeting-hero">
          <div class="greeting-title">System Status: <span id="greeting-name">User</span></div>
          <div class="greeting-score-wrap">
            <div class="greeting-score-num" id="greeting-score-num">0</div>
            <div class="greeting-score-label">POWER SCORE</div>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="stat-card"><div class="sc-label">TOTAL HOURS</div><div class="sc-val" id="stat-val-study">0h</div></div>
          <div class="stat-card"><div class="sc-label">STREAK</div><div class="sc-val" id="stat-val-streak">0</div></div>
          
          <div class="card">
            <div class="card-header"><h3 class="card-title">Project Progress</h3></div>
            <div class="card-body">
              <input type="range" id="project-progress-slider" class="proj-slider" min="0" max="100" value="0">
              <div id="project-progress-val">0%</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" id="panel-study">
        <div class="card">
          <form id="study-form" class="log-form">
            <input type="date" id="study-date" required>
            <select id="study-subject"><option value="DSA">DSA</option><option value="OS">OS</option></select>
            <input type="number" id="study-hours" placeholder="Hours" step="0.5" required>
            <button type="submit" class="btn-primary">LOG SESSION</button>
          </form>
        </div>
        <div class="card"><table class="session-table"><tbody id="study-log-tbody"></tbody></table></div>
      </section>

      <section class="panel" id="panel-subjects">
        <div class="subject-grid" id="subject-grid"></div>
      </section>

      <section class="panel" id="panel-analytics">
        <div class="analytics-grid">
            <div class="card card-large"><canvas id="chart-competition"></canvas></div>
            <div class="card card-large"><canvas id="chart-score-history"></canvas></div>
        </div>
      </section>

      <section class="panel" id="panel-journal">
        <div class="card">
            <form id="mistake-form"><input type="text" id="mistake-title" placeholder="What went wrong?" required><button type="submit">LOG</button></form>
            <div id="mistake-list"></div>
        </div>
      </section>

      <section class="panel" id="panel-settings">
        <div class="card">
            <input type="text" id="settings-name" placeholder="Change Name">
            <button id="btn-save-settings">Save</button>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
